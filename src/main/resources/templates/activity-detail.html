<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>

<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4 activity-detail-page" th:fragment="content">

    <!-- 🔙 BACK + ACTIONS -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a th:href="@{/clubs/{id}/activities(id=${activity.clubId})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm"
               th:href="@{/activities/{id}/edit(id=${activity.id})}">
                <i class="bi bi-pencil"></i> Edit
            </a>

            <form th:action="@{/activities/{id}/delete(id=${activity.id})}"
                  method="post"
                  onsubmit="return confirm('Delete this activity?');">
                <button class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- 🧠 TITLE + META -->
    <div class="mb-4">
        <h2 class="fw-bold mb-1" th:text="${activity.title}">Activity Title</h2>

        <div class="d-flex flex-wrap gap-3 text-muted small">
            <span>
                <i class="bi bi-calendar-event"></i>
                <span th:text="${#temporals.format(activity.date, 'dd MMM yyyy HH:mm')}"></span>
            </span>

            <span th:if="${activity.createdAt != null}">
                <i class="bi bi-clock"></i>
                Created <span th:text="${#temporals.format(activity.createdAt, 'dd MMM yyyy')}"></span>
            </span>

            <span th:if="${activity.createdByName != null}">
                <i class="bi bi-person"></i>
                By <span th:text="${activity.createdByName}"></span>
            </span>
        </div>
    </div>

    <!-- 📦 MAIN CONTENT -->
    <div class="row g-4">

        <!-- 📝 LEFT: DESCRIPTION -->
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body">

                    <h6 class="text-muted mb-3">Description</h6>

                    <p class="mb-0"
                       th:text="${activity.description != null && !#strings.isEmpty(activity.description) ? activity.description : 'No description provided.'}">
                    </p>

                </div>
            </div>
        </div>

        <!-- 📊 RIGHT: SIDEBAR -->
        <div class="col-lg-4">

            <!-- 📅 EVENT CARD -->
            <div class="card shadow-sm border-0 rounded-4 mb-3">
                <div class="card-body">

                    <h6 class="text-muted mb-3">
                        <i class="bi bi-calendar-check"></i> Linked Event
                    </h6>

                    <div th:if="${activity.eventId != null}">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-semibold">This activity is linked to an event</span>
                        </div>

                        <a class="btn btn-primary w-100 mt-3"
                           th:href="@{/events/{id}(id=${activity.eventId})}">
                            View Event
                        </a>
                    </div>

                    <div th:if="${activity.eventId == null}" class="text-muted small">
                        No event linked to this activity.
                    </div>

                </div>
            </div>

            <!-- 📌 QUICK INFO -->
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body">

                    <h6 class="text-muted mb-3">
                        <i class="bi bi-info-circle"></i> Info
                    </h6>

                    <ul class="list-unstyled mb-0 small">

                        <li class="mb-2">
                            <span class="text-muted">Activity ID</span><br>
                            <span th:text="${activity.id}"></span>
                        </li>

                        <li class="mb-2">
                            <span class="text-muted">Club ID</span><br>
                            <span th:text="${activity.clubId}"></span>
                        </li>

                        <li th:if="${activity.updatedAt != null}">
                            <span class="text-muted">Last update</span><br>
                            <span th:text="${#temporals.format(activity.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
                        </li>

                    </ul>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
