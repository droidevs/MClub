<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <div>
            <h2 class="display-6">Create event</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/clubs}">Back</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Submit via REST API (JSON) -->
    <form id="createEventForm" th:object="${form}" class="card shadow-sm border-0">
        <div class="card-body">
            <input type="hidden" th:field="*{clubId}" />

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" th:field="*{title}" />
                <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input class="form-control" th:field="*{location}" />
                <div class="text-danger small" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Start</label>
                    <input class="form-control" type="datetime-local" th:field="*{startDate}" />
                    <div class="text-danger small" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">End</label>
                    <input class="form-control" type="datetime-local" th:field="*{endDate}" />
                    <div class="text-danger small" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <button class="btn btn-primary" type="submit">Create</button>
            </div>
        </div>
    </form>

    <!-- Keep the script INSIDE the content fragment; otherwise it gets dropped by layout.html -->
    <script th:inline="javascript">
        function toIsoLocalDateTime(value) {
            // HTML datetime-local typically returns: "YYYY-MM-DDTHH:mm" (no seconds)
            // Jackson LocalDateTime expects ISO_LOCAL_DATE_TIME. Ensure we send seconds.
            if (!value) return null;
            return value.length === 16 ? (value + ":00") : value;
        }

        async function readResponseBody(res) {
            const ct = res.headers.get('content-type') || '';
            try {
                if (ct.includes('application/json')) {
                    return JSON.stringify(await res.json());
                }
            } catch (_) {
                // ignore
            }
            try {
                return await res.text();
            } catch (_) {
                return '';
            }
        }

        // Attach listener after DOM is ready (safe if fragment is injected)
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('createEventForm');
            console.log('[createEvent] DOMContentLoaded, form found:', !!form);
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                console.log('[createEvent] submit handler fired');

                const fd = new FormData(form);

                const dto = {
                    clubId: String(fd.get('clubId') || ''),
                    title: String(fd.get('title') || ''),
                    description: String(fd.get('description') || ''),
                    location: String(fd.get('location') || ''),
                    startDate: toIsoLocalDateTime(String(fd.get('startDate') || '')),
                    endDate: toIsoLocalDateTime(String(fd.get('endDate') || ''))
                };

                console.log('[createEvent] payload', dto);

                let res;
                try {
                    res = await fetch('/api/events', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify(dto)
                    });
                } catch (err) {
                    console.error('[createEvent] network error', err);
                    alert('Network error calling /api/events. Check console.');
                    return;
                }

                const body = await readResponseBody(res);

                console.log('[createEvent] response', {
                    ok: res.ok,
                    status: res.status,
                    redirected: res.redirected,
                    url: res.url,
                    body
                });

                if (res.ok) {
                    window.location.href = '/clubs';
                    return;
                }

                if (res.redirected && res.url && res.url.includes('/login')) {
                    alert('Your session is not authenticated. Please login again, then retry.');
                    window.location.href = '/login';
                    return;
                }

                alert(body || 'Could not create event');
            });
        });
    </script>
</div>

</body>
</html>
