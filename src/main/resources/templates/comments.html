<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="row align-items-center mt-4 mb-3">
        <div class="col">
            <a class="text-decoration-none" th:href="${backUrl}">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <h2 class="display-6 mt-2">
                <i class="bi bi-chat-left-text"></i>
                <span th:text="${pageTitle}">Comments</span>
            </h2>
            <div class="text-muted" th:if="${pageSubtitle}">
                <span th:text="${pageSubtitle}">Target title</span>
            </div>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success border-0 shadow-sm" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm" th:text="${error}"></div>

    <div class="card border-0 shadow-sm rounded-4 mb-4" sec:authorize="hasRole('STUDENT')">
        <div class="card-body">
            <h5 class="card-title">Post a comment</h5>
            <form id="commentForm"
                  th:attr="data-target-type=${targetType},data-target-id=${targetId}">
                <div class="mb-3">
                    <textarea class="form-control" rows="3" placeholder="Write a comment…" name="content" required></textarea>
                </div>
                <button class="btn btn-primary rounded-pill px-4" type="submit">Post</button>
            </form>
            <div class="form-text mt-2">Your comment will appear after the page reloads.</div>
        </div>
    </div>

    <!-- Recursive fragment to render a comment + its child replies -->
    <div th:fragment="commentNode(c, level)">
        <div th:if="${c == null}" class="text-muted small">[missing comment]</div>

        <div th:if="${c != null}"
             class="border rounded-3 p-3 mb-3 bg-white"
             th:with="lvl=${level == null ? 0 : level}"
             th:style="|margin-left:${#numbers.formatInteger(lvl,1)}em|">
            <!-- Using em instead of px and avoiding multiplication keeps Thymeleaf from throwing if types are weird -->

            <div class="d-flex justify-content-between align-items-start">
                <div class="fw-semibold"
                     th:text="${#strings.isEmpty(c.authorFullName) ? 'Unknown' : c.authorFullName}">User</div>
                <div class="text-muted small"
                     th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'dd MMM yyyy HH:mm') : ''}"></div>
            </div>

            <div class="mt-2" th:text="${c.content}">Comment body</div>

            <div class="text-muted small mt-2" th:if="${c.replyCount > 0}">
                <span th:text="${c.replyCount}">0</span> replies
            </div>

            <!-- Reply preview: top 1 reply is included by the controller/service -->
            <div class="mt-3" th:if="${c.replies != null and !#lists.isEmpty(c.replies)}">
                <div class="border-start ps-3">
                    <div th:each="r : ${c.replies}" class="mb-2">
                        <div class="d-flex justify-content-between">
                            <div class="fw-semibold small" th:text="${#strings.isEmpty(r.authorFullName) ? 'Unknown' : r.authorFullName}">User</div>
                            <div class="text-muted small" th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd MMM yyyy HH:mm') : ''}"></div>
                        </div>
                        <div class="small mt-1" th:text="${r.content}">Reply body</div>
                    </div>

                    <!-- Fetch-and-expand replies -->
                    <button type="button"
                            class="btn btn-link btn-sm p-0 text-decoration-none"
                            th:if="${c.hasMoreReplies}"
                            th:attr="data-toggle-replies=${c.id}">
                        See more replies
                    </button>

                    <!-- This container will be populated by JS after fetching from /api/comments/{id}/replies -->
                    <div class="mt-2 d-none" th:attr="data-replies-container=${c.id}"></div>
                </div>
            </div>

            <div class="mt-3" sec:authorize="hasRole('STUDENT')">
                <details>
                    <summary class="small text-muted" style="cursor:pointer;">Reply</summary>
                    <form class="mt-2 replyForm"
                          th:attr="data-parent-id=${c.id},data-target-type=${targetType},data-target-id=${targetId}">
                        <div class="mb-2">
                            <textarea class="form-control" name="content" rows="2" placeholder="Write a reply…" required></textarea>
                        </div>
                        <button class="btn btn-sm btn-outline-primary rounded-pill" type="submit">Post reply</button>
                    </form>
                </details>
            </div>
        </div>

        <!-- IMPORTANT: for this page we intentionally do NOT recursively render deeper replies here.
             The controller returns only a preview (top 1 reply) and we keep the UI predictable.
             Full threads can be implemented later with server-side fetching. -->
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
            <h5 class="card-title mb-3">All comments</h5>

            <div th:if="${#lists.isEmpty(comments)}" class="text-muted">No comments yet.</div>

            <div th:each="c : ${comments}">
                <div th:replace="~{this :: commentNode(c=${c}, level=${0})}"></div>
            </div>
        </div>
    </div>

    <script>
        const escapeHtml = (unsafe) => {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        };

        const formatDateTime = (iso) => {
            if (!iso) return '';
            return iso.replace('T', ' ');
        };

        const renderReply = (r) => {
            const author = r.authorFullName && r.authorFullName.trim() ? r.authorFullName : 'Unknown';
            return `
                <div class="mb-2">
                    <div class="d-flex justify-content-between">
                        <div class="fw-semibold small">${escapeHtml(author)}</div>
                        <div class="text-muted small">${escapeHtml(formatDateTime(r.createdAt))}</div>
                    </div>
                    <div class="small mt-1">${escapeHtml(r.content)}</div>
                </div>
            `;
        };

        const fetchJson = async (url) => {
            const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
        };

        const getCsrf = () => {
            // Spring Security (Thymeleaf) commonly exposes these meta tags.
            const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content') || 'X-CSRF-TOKEN';
            return token ? { header, token } : null;
        };

        const postJson = async (url, body) => {
            const csrf = getCsrf();
            const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
            if (csrf) headers[csrf.header] = csrf.token;

            const resp = await fetch(url, {
                method: 'POST',
                headers,
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                let msg = 'HTTP ' + resp.status;
                try {
                    const text = await resp.text();
                    if (text) msg += ' - ' + text;
                } catch (_) {
                }
                throw new Error(msg);
            }
            // Comment API returns CommentDto
            return resp.json();
        };

        // Post a top-level comment via REST API.
        document.getElementById('commentForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.currentTarget;
            const targetType = form.dataset.targetType;
            const targetId = form.dataset.targetId;
            const content = form.querySelector('textarea[name="content"]').value.trim();
            if (!content) return;

            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                await postJson(`/api/comments/${encodeURIComponent(targetType)}/${encodeURIComponent(targetId)}`, {
                    content,
                    parentId: null
                });
                // simplest UX: reload so server-side rendered list updates
                window.location.reload();
            } catch (err) {
                alert('Could not post comment: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Post a reply via REST API (generic endpoint with parentId).
        document.querySelectorAll('form.replyForm').forEach((f) => {
            f.addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.currentTarget;
                const targetType = form.dataset.targetType;
                const targetId = form.dataset.targetId;
                const parentId = form.dataset.parentId;
                const content = form.querySelector('textarea[name="content"]').value.trim();
                if (!content) return;

                const btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                try {
                    await postJson(`/api/comments/${encodeURIComponent(targetType)}/${encodeURIComponent(targetId)}`, {
                        content,
                        parentId
                    });
                    window.location.reload();
                } catch (err) {
                    alert('Could not post reply: ' + err.message);
                } finally {
                    btn.disabled = false;
                }
            });
        });

        // Expand/collapse replies (children only) via REST API.
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-toggle-replies]');
            if (!btn) return;

            const commentId = btn.getAttribute('data-toggle-replies');
            const container = document.querySelector(`[data-replies-container="${commentId}"]`);
            if (!container) return;

            // Toggle if already loaded
            if (!container.classList.contains('d-none')) {
                container.classList.add('d-none');
                btn.textContent = 'See more replies';
                return;
            }

            btn.disabled = true;
            const oldText = btn.textContent;
            btn.textContent = 'Loading…';

            try {
                const replies = await fetchJson(`/api/comments/${encodeURIComponent(commentId)}/replies`);
                if (!replies || replies.length === 0) {
                    container.innerHTML = `<div class="text-muted small">No more replies.</div>`;
                } else {
                    container.innerHTML = replies.map(renderReply).join('');
                }
                container.classList.remove('d-none');
                btn.textContent = 'Hide replies';
            } catch (err) {
                container.innerHTML = `<div class="text-danger small">Could not load replies.</div>`;
                container.classList.remove('d-none');
                btn.textContent = oldText;
            } finally {
                btn.disabled = false;
            }
        });
    </script>

</div>
</body>
</html>
