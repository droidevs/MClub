<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <h2><i class="bi bi-gear-fill"></i> My Managed Clubs</h2>

    <div th:if="${message}" class="alert alert-success mt-2" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger mt-2" th:text="${error}"></div>

    <div class="row mt-4">
        <div class="col-md-4" th:each="club : ${clubs}">
            <div class="card mb-4 shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${club.name}"></h5>
                    <p class="card-text text-muted" th:text="${club.description}"></p>

                    <div class="d-flex gap-2 flex-wrap mt-3">
                        <a th:href="@{/clubs/{id}/memberships(id=${club.id})}"
                           class="btn btn-outline-primary btn-sm rounded-pill">
                            <i class="bi bi-inbox"></i> Applications
                        </a>

                        <a th:href="@{/clubs/{id}/manage-members(id=${club.id})}"
                           class="btn btn-outline-secondary btn-sm rounded-pill">
                            <i class="bi bi-people"></i> Members
                        </a>

                        <a th:href="@{/clubs/{id}/attendance(id=${club.id})}"
                           class="btn btn-outline-success btn-sm rounded-pill">
                            <i class="bi bi-qr-code-scan"></i> Attendance
                        </a>

                        <a th:href="@{/clubs/{id}/events/new(id=${club.id})}"
                           class="btn btn-outline-warning btn-sm rounded-pill">
                            <i class="bi bi-calendar-plus"></i> New event
                        </a>

                        <a th:href="@{/clubs/{id}/activities/new(id=${club.id})}"
                           class="btn btn-outline-dark btn-sm rounded-pill">
                            <i class="bi bi-plus-circle"></i> New activity
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(clubs)}">
            <div class="alert alert-info">
                You do not manage any clubs currently. Submit a club application to get started.
            </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-4"
             th:if="${clubsPage.totalPages > 1}">

            <!-- Page info -->
            <div class="text-muted small">
                Page <span th:text="${clubsPage.number + 1}"></span>
                of <span th:text="${clubsPage.totalPages}"></span>
            </div>

            <!-- Pagination controls -->
            <nav>
                <ul class="pagination pagination-sm mb-0">

                    <!-- Previous -->
                    <li class="page-item" th:classappend="${!clubsPage.hasPrevious()} ? 'disabled'">
                        <a class="page-link rounded-pill"
                           th:href="@{/clubs(page=${clubsPage.number - 1}, size=${clubsPage.size})}">
                            ←
                        </a>
                    </li>

                    <!-- Page numbers -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, clubsPage.totalPages - 1)}"
                        th:classappend="${i == clubsPage.number} ? 'active'">
                        <a class="page-link rounded-pill"
                           th:href="@{/clubs(page=${i}, size=${clubsPage.size})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <!-- Next -->
                    <li class="page-item" th:classappend="${!clubsPage.hasNext()} ? 'disabled'">
                        <a class="page-link rounded-pill"
                           th:href="@{/clubs(page=${clubsPage.number + 1}, size=${clubsPage.size})}">
                            →
                        </a>
                    </li>

                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
