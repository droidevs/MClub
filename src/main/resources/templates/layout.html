<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MClub - Club Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body th:fragment="body(content)">

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">MClub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clubs}"><i class="bi bi-people me-1"></i>Clubs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}"><i class="bi bi-calendar-event me-1"></i>Events</a>
                </li>

                <!-- Club management area is club-scoped; we only require login here. -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link text-info" th:href="@{/clubs/my-managed}"><i class="bi bi-shield-lock me-1"></i>Club Admin</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PLATFORM_ADMIN')" data-requires-role="ROLE_PLATFORM_ADMIN">
                    <a class="nav-link text-warning" th:href="@{/club-applications}"><i class="bi bi-inbox me-1"></i>Applications</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2" sec:authorize="isAuthenticated()" data-auth="authenticated">
                <div class="text-end">
                    <div class="text-white fw-semibold"
                         th:text="${currentUserName != null ? currentUserName : #authentication?.name}"
                         data-auth-name>User</div>
                    <div class="small text-white-50"
                         th:text="${currentUserEmail != null ? currentUserEmail : #authentication?.name}"
                         data-auth-email>email</div>
                </div>
                <!-- Role badge: prefer model-provided role, else fall back to Spring Security role checks -->
                <span class="badge bg-secondary" th:if="${currentUserRole != null}" th:text="${currentUserRole}" data-auth-role>ROLE</span>
                <span class="badge bg-secondary" th:if="${currentUserRole == null}" data-auth-role>
                    <span sec:authorize="hasRole('PLATFORM_ADMIN')">PLATFORM_ADMIN</span>
                    <span sec:authorize="hasRole('STUDENT')">STUDENT</span>
                </span>

                <form th:action="@{/logout}" method="post" class="ms-2">
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            </div>
            <div class="d-flex" sec:authorize="!isAuthenticated()" data-auth="anonymous">
                <a class="btn btn-primary btn-sm me-2" th:href="@{/login}">Login</a>
                <a class="btn btn-success btn-sm" th:href="@{/register}">Register</a>
            </div>
        </div>
    </div>
</nav>

<main class="container" style="padding-top: 70px;">
    <!-- Render the passed content fragment safely -->
    <div th:replace="${content}"></div>
</main>

<!-- Bootstrap JS (must be inside the fragment so it is included on pages using body replacement) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Floating chat widget -->
<script th:src="@{/js/chat-widget.js}"></script>

</body>
</html>
