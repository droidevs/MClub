<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="mt-4 mb-4">
        <h2 class="display-6"><i class="bi bi-shield-check text-primary"></i> Application Management</h2>
        <p class="text-muted">Review and manage club establishment requests across the platform.</p>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4" th:each="stat : ${stats}">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-grow-1">
                        <h6 class="text-muted text-uppercase small fw-bold" th:text="${stat.key}">Status</h6>
                        <h3 class="mb-0" th:text="${stat.value}">0</h3>
                    </div>
                    <div class="ms-3">
                        <i class="bi bi-collection fs-3 text-primary opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <ul class="nav nav-tabs border-bottom-0 mb-0">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentStatus == 'PENDING' ? 'active fw-bold' : ''}"
               th:href="@{/club-applications(status='PENDING')}">
                Pending <span class="badge bg-primary ms-1" th:text="${stats.get('pending')}">0</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentStatus == 'APPROVED' ? 'active fw-bold' : ''}"
               th:href="@{/club-applications(status='APPROVED')}">Approved</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentStatus == 'REJECTED' ? 'active fw-bold' : ''}"
               th:href="@{/club-applications(status='REJECTED')}">Rejected</a>
        </li>
    </ul>

    <div class="card shadow-sm border-0 rounded-bottom">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Club Detail</th>
                    <th>Applicant</th>
                    <th>Date Submitted</th>
                    <th class="text-center pe-4">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="app : ${applicationsPage.content}" class="activity-row">
                    <td class="ps-4">
                        <div class="fw-bold" th:text="${app.name}">Club Name</div>
                        <small class="text-muted d-block text-truncate" style="max-width: 300px;" th:text="${app.description}"></small>
                    </td>
                    <td>
                        <div th:text="${app.submittedBy.name}">Name</div>
                        <small class="text-muted" th:text="${app.submittedBy.email}"></small>
                    </td>
                    <td th:text="${#temporals.format(app.createdAt, 'dd MMM yyyy')}">Date</td>
                    <td class="pe-4">
                        <div class="d-flex justify-content-center gap-2">
                            <th:block th:if="${currentStatus == 'PENDING'}">
                                <form th:action="@{/club-applications/{id}/approve(id=${app.id})}" method="post">
                                    <button type="submit" class="btn btn-success btn-sm px-3 shadow-sm">Approve</button>
                                </form>
                                <form th:action="@{/club-applications/{id}/reject(id=${app.id})}" method="post">
                                    <button type="submit" class="btn btn-outline-danger btn-sm px-3 shadow-sm">Reject</button>
                                </form>
                            </th:block>

                            <th:block th:unless="${currentStatus == 'PENDING'}">
                                <a th:href="@{/club-applications/{id}(id=${app.id})}" class="btn btn-outline-secondary btn-sm px-3">Details</a>
                            </th:block>
                        </div>
                    </td>
                </tr>
                <tr th:if="${applicationsPage.totalElements}">
                    <td colspan="4" class="text-center p-5 text-muted">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        No applications found in <span th:text="${currentStatus}">status</span>.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-0 py-3" th:if="${applicationsPage.totalPages > 1}">
            <nav>
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${applicationsPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/club-applications(status=${currentStatus}, page=${applicationsPage.number - 1})}">Previous</a>
                    </li>
                    <li class="page-item" th:classappend="${applicationsPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/club-applications(status=${currentStatus}, page=${applicationsPage.number + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
