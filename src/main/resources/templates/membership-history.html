<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">

    <!-- 🔹 Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-0">Membership History</h2>
            <small class="text-muted">
                Manage approved and rejected applications for
                <strong th:text="${club.name}"></strong>
            </small>
        </div>

        <a th:href="@{|/clubs/${club.id}|}" class="btn btn-outline-secondary btn-sm">
            ← Back to Club
        </a>
    </div>


    <!-- 🔹 Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Total Records</h6>
                    <h4 th:text="${historyPage.totalElements}"></h4>
                </div>
            </div>
        </div>
    </div>


    <!-- 🔹 Filters + Search -->
    <div class="card shadow-sm border-0 mb-3">
        <div class="card-body d-flex flex-wrap gap-2 justify-content-between align-items-center">

            <!-- Status Filters -->
            <div class="btn-group">
                <a th:href="@{|/clubs/${club.id}/membership-history|}"
                   class="btn btn-sm"
                   th:classappend="${param.status == null} ? 'btn-dark' : 'btn-outline-dark'">
                    All
                </a>

                <a th:href="@{|/clubs/${club.id}/membership-history?status='APPROVED'|}"
                   class="btn btn-sm"
                   th:classappend="${param.status == 'APPROVED'} ? 'btn-success' : 'btn-outline-success'">
                    Approved
                </a>

                <a th:href="@{|/clubs/${club.id}/membership-history?status='REJECTED'|}"
                   class="btn btn-sm"
                   th:classappend="${param.status == 'REJECTED'} ? 'btn-danger' : 'btn-outline-danger'">
                    Rejected
                </a>
            </div>

            <!-- Search -->
            <form method="get" class="d-flex gap-2">
                <input type="hidden" name="status" th:value="${param.status}">
                <input type="text"
                       name="q"
                       class="form-control form-control-sm"
                       placeholder="Search member..."
                       th:value="${param.q}">
                <button class="btn btn-sm btn-primary">Search</button>
            </form>

        </div>
    </div>


    <!-- 🔹 Table Card -->
    <div class="card shadow-sm border-0">

        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Joined</th>
                    <th>Updated</th>
                </tr>
                </thead>

                <tbody>

                <!-- Empty state -->
                <tr th:if="${historyPage.totalElements == 0}">
                    <td colspan="5" class="text-center py-4 text-muted">
                        No history found
                    </td>
                </tr>

                <!-- Data -->
                <tr th:each="h : ${history}">

                    <td>
                        <div class="fw-semibold" th:text="${h.fullName}"></div>
                        <small class="text-muted" th:text="${h.email}"></small>
                    </td>

                    <td>
                        <span class="badge bg-secondary"
                              th:text="${h.role}">
                        </span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="
                                ${h.status.name() == 'APPROVED'} ? 'bg-success' :
                                (${h.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark')
                              "
                              th:text="${h.status}">
                        </span>
                    </td>

                    <td>
                        <small th:text="${#temporals.format(h.joinedAt, 'dd MMM yyyy')}"></small><br/>
                        <small class="text-muted"
                               th:text="${#temporals.format(h.joinedAt, 'HH:mm')}"></small>
                    </td>

                    <td>
                        <small th:text="${#temporals.format(h.updatedAt, 'dd MMM yyyy')}"></small><br/>
                        <small class="text-muted"
                               th:text="${#temporals.format(h.updatedAt, 'HH:mm')}"></small>
                    </td>

                </tr>

                </tbody>
            </table>
        </div>

    </div>


    <!-- 🔹 Pagination -->
    <nav class="mt-3 d-flex justify-content-between align-items-center">

        <span class="text-muted small">
            Page <span th:text="${historyPage.number + 1}"></span>
            of <span th:text="${historyPage.totalPages}"></span>
        </span>

        <ul class="pagination mb-0">

            <li class="page-item" th:classappend="${historyPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{|/clubs/${club.id}/membership-history?page=${historyPage.number - 1}&status=${param.status}|}">
                    Prev
                </a>
            </li>

            <li class="page-item" th:classappend="${historyPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{|/clubs/${club.id}/membership-history?page=${historyPage.number + 1}&status=${param.status}|}">
                    Next
                </a>
            </li>

        </ul>

    </nav>

</div>

</body>
</html>
