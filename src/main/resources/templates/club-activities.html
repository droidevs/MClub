<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1"><i class="bi bi-lightning-charge text-info"></i> Activities</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Club
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Title</th>
                        <th>Date</th>
                        <th>Linked event</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${activitiesPage.content}"
                        class="activity-row"
                        th:onclick="|window.location.href='@{/activities/{id}(id=${a.id})}'|"
                        style="cursor: pointer;">

                        <td class="ps-4">
                            <div class="fw-semibold" th:text="${a.title}">Title</div>
                            <small class="text-muted">
                                Created <span th:text="${#temporals.format(a.createdAt, 'dd MMM yyyy')}"></span>
                            </small>
                        </td>

                        <td class="text-muted">
                            <i class="bi bi-calendar-event me-1"></i>
                            <span th:text="${#temporals.format(a.date, 'dd MMM yyyy HH:mm')}"></span>
                        </td>

                        <td class="text-end pe-4">
                            <i class="bi bi-chevron-right text-muted"></i>
                        </td>

                    </tr>
                    </tbody>
                </table>
                <div class="text-center text-muted p-4" th:if="${activitiesPage.totalElements}">
                    No activities yet.
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3"
         th:if="${activitiesPage.totalPages > 1}">

        <!-- Page info -->
        <div class="text-muted small">
            Page <span th:text="${activitiesPage.number + 1}"></span>
            of <span th:text="${activitiesPage.totalPages}"></span>
        </div>

        <!-- Navigation -->
        <nav>
            <ul class="pagination pagination-sm mb-0">

                <!-- Previous -->
                <li class="page-item"
                    th:classappend="${activitiesPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/clubs/{id}/activities(
                        id=${club.id},
                        page=${activitiesPage.number - 1},
                        size=${activitiesPage.size}
                   )}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>

                <!-- Page numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, activitiesPage.totalPages - 1)}"
                    th:classappend="${i == activitiesPage.number} ? 'active'">

                    <a class="page-link"
                       th:href="@{/clubs/{id}/activities(
                        id=${club.id},
                        page=${i},
                        size=${activitiesPage.size}
                   )}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <!-- Next -->
                <li class="page-item"
                    th:classappend="${activitiesPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/clubs/{id}/activities(
                        id=${club.id},
                        page=${activitiesPage.number + 1},
                        size=${activitiesPage.size}
                   )}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>

            </ul>
        </nav>
    </div>
</div>

</body>
</html>
