<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <div>
            <h2 class="display-6">My Applications</h2>
            <div class="text-muted">Track your club membership requests</div>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/clubs}">Browse More Clubs</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Club Name</th>
                        <th>Description</th>
                        <th>Submitted Date</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="app : ${applicationsPage.content}" class="activity-row">
                        <td>
                            <strong th:text="${app.name}">Club Name</strong>
                        </td>
                        <td>
                                <span class="text-muted small"
                                      th:text="${#strings.abbreviate(app.description, 50)}">
                                    Description...
                                </span>
                        </td>
                        <td th:text="${#temporals.format(app.createdAt, 'dd MMM yyyy')}">Date</td>
                        <td>
                                <span th:class="|status-badge ${app.status == T(io.droidevs.mclub.enums.ApplicationStatus).PENDING ? 'status-pending' :
                                               (app.status == T(io.droidevs.mclub.enums.ApplicationStatus).APPROVED ? 'status-approved' : 'status-rejected')}|"
                                      th:text="${app.status}">
                                    STATUS
                                </span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/my-dashboard/applications/{id}(id=${app.id})}"
                               class="btn btn-sm btn-outline-secondary">View Details</a>
                        </td>
                    </tr>
                    <tr th:if="${applicationsPage.totalElements}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <p>You haven't submitted any applications yet.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white border-0 py-3" th:if="${applicationsPage.totalPages > 1}">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${applicationsPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/my-dashboard(page=${applicationsPage.number - 1})}">Previous</a>
                    </li>
                    <li class="page-item" th:classappend="${applicationsPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/my-dashboard(page=${applicationsPage.number + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script>
    // Logic for dynamic updates can be added here, similar to your activity search
    function refreshList() {
        console.log("Refreshing application list...");
        // You can fetch from /api/applications/my-applications to update the UI without reloading
    }
</script>

</body>
</html>
