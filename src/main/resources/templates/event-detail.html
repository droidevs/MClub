<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="d-flex justify-content-between align-items-start mt-4">
        <div>
            <h2 class="display-6 mb-1" th:text="${event.title}">Event title</h2>
            <div class="text-muted">
                <span class="me-3"><i class="bi bi-geo-alt"></i> <span th:text="${event.location}">Location</span></span>
                <span><i class="bi bi-calendar-event"></i>
                    <span th:text="${#temporals.format(event.startDate, 'yyyy-MM-dd HH:mm')}">Start</span>
                    <span th:if="${event.endDate != null}">– <span th:text="${#temporals.format(event.endDate, 'yyyy-MM-dd HH:mm')}">End</span></span>
                </span>
            </div>
        </div>
        <div>
            <a th:href="@{/events}" class="btn btn-outline-secondary btn-sm">Back</a>
        </div>
    </div>

    <div class="row g-3 mt-2">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <p class="mb-0" th:text="${event.description}">Description</p>
                </div>
            </div>

            <!-- Comments -->
            <div class="card shadow-sm border-0 mt-3" id="commentsCard">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Comments</h5>
                    <small class="text-muted" id="commentsHint">Loading…</small>
                </div>
                <div class="card-body">
                    <div class="mb-3" sec:authorize="hasRole('STUDENT')">
                        <label class="form-label">Add a comment</label>
                        <textarea id="newComment" class="form-control" rows="3" maxlength="2000" placeholder="Be respectful…"></textarea>
                        <div class="d-flex justify-content-end mt-2">
                            <button class="btn btn-primary" id="postCommentBtn">Post</button>
                        </div>
                    </div>

                    <div id="commentsList"></div>

                    <div class="text-muted" th:if="${auth == null}">
                        <small>Login to comment.</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Rating summary (uses existing API used in events.html) -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light"><h6 class="mb-0">Rating</h6></div>
                <div class="card-body">
                    <div id="ratingSummary" class="text-muted small">Loading…</div>

                    <div class="mt-3" sec:authorize="hasRole('STUDENT')">
                        <label class="form-label">Rate this event</label>
                        <div class="input-group">
                            <select class="form-select" id="ratingValue">
                                <option value="5">5 - Excellent</option>
                                <option value="4">4 - Good</option>
                                <option value="3">3 - OK</option>
                                <option value="2">2 - Bad</option>
                                <option value="1">1 - Terrible</option>
                            </select>
                            <button class="btn btn-outline-primary" id="rateBtn">Submit</button>
                        </div>
                        <div class="form-text">You can rate only if you attended.</div>
                    </div>
                </div>
            </div>

            <!-- Attendees: only show after event ended -->
            <div class="card shadow-sm border-0 mt-3" th:if="${eventEnded}">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">Attendees</h6>
                    <span class="badge text-bg-secondary" th:text="${attendanceCount}">0</span>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="a : ${attendance}">
                            <div class="fw-semibold" th:text="${a.userEmail}">student@example.com</div>
                            <div class="text-muted small">
                                <span th:text="${#temporals.format(a.checkedInAt, 'yyyy-MM-dd HH:mm')}">time</span>
                                <span class="ms-2" th:text="${a.method}">method</span>
                            </div>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(attendance)}">No attendance records.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const EVENT_ID = /*[[${event.id}]]*/ null;

    function withTimeout(promise, ms) {
        return Promise.race([
            promise,
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
        ]);
    }

    async function safeText(res) {
        try { return await res.text(); } catch (_) { return ''; }
    }

    async function loadRatingSummary() {
        const el = document.getElementById('ratingSummary');
        el.textContent = 'Loading…';
        try {
            // Backend endpoint is GET /api/events/{eventId}/ratings/summary
            const res = await withTimeout(fetch(`/api/events/${EVENT_ID}/ratings/summary`, { credentials: 'same-origin' }), 8000);
            if (!res.ok) {
                el.textContent = 'No rating summary available.';
                return;
            }
            const data = await res.json();
            el.textContent = `${Number(data.average || 0).toFixed(1)} / 5 (${Number(data.count || 0)} ratings)`;
        } catch (e) {
            el.textContent = 'No rating summary available.';
        }
    }

    async function submitRating() {
        const rating = Number(document.getElementById('ratingValue').value);
        const comment = null;
        const res = await fetch(`/api/events/${EVENT_ID}/ratings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ rating, comment })
        });
        if (!res.ok) {
            const txt = await safeText(res);
            alert(txt || (res.status === 401 ? 'Please login.' : 'Could not rate. Make sure you attended and the event has ended.'));
            return;
        }
        await loadRatingSummary();
    }

    function escapeHtml(s) {
        return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderComment(c, depth) {
        const wrap = document.createElement('div');
        wrap.className = 'border rounded p-2 mb-2';
        wrap.style.marginLeft = Math.min(depth * 18, 72) + 'px';

        const header = document.createElement('div');
        header.className = 'd-flex justify-content-between align-items-center';
        header.innerHTML = `<div class="fw-semibold">${escapeHtml(c.authorFullName)}</div>
                            <div class="text-muted small">${c.createdAt ? new Date(c.createdAt).toLocaleString() : ''}</div>`;

        const body = document.createElement('div');
        body.className = 'mt-1';
        body.innerHTML = `<div>${escapeHtml(c.content)}</div>`;

        const actions = document.createElement('div');
        actions.className = 'mt-2 d-flex gap-2 align-items-center';
        actions.innerHTML = `
            <button class="btn btn-sm btn-outline-secondary" data-like="${c.id}">
                Like <span class="badge text-bg-light">${c.likeCount}</span>
            </button>
            <button class="btn btn-sm btn-outline-secondary" data-reply="${c.id}">Reply</button>
        `;

        const replies = document.createElement('div');
        (c.replies || []).forEach(r => replies.appendChild(renderComment(r, depth + 1)));

        wrap.appendChild(header);
        wrap.appendChild(body);
        wrap.appendChild(actions);
        wrap.appendChild(replies);
        return wrap;
    }

    async function loadComments() {
        const hint = document.getElementById('commentsHint');
        const list = document.getElementById('commentsList');
        list.innerHTML = '';
        hint.textContent = 'Loading…';
        try {
            const res = await withTimeout(fetch(`/api/comments/EVENT/${EVENT_ID}`, { credentials: 'same-origin' }), 8000);
            if (!res.ok) {
                const txt = await safeText(res);
                hint.textContent = txt || (res.status === 401 ? 'Login to view comments.' : 'Failed to load');
                return;
            }
            const data = await res.json();
            hint.textContent = data.length ? `${data.length} threads` : 'No comments yet';
            data.forEach(c => list.appendChild(renderComment(c, 0)));
        } catch (e) {
            hint.textContent = 'Failed to load';
        }
    }

    async function postComment(content, parentId) {
        const res = await fetch(`/api/comments/EVENT/${EVENT_ID}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ content, parentId: parentId || null })
        });
        if (!res.ok) {
            const txt = await safeText(res);
            alert(txt || (res.status === 401 ? 'Please login.' : 'Could not post comment'));
            return;
        }
        await loadComments();
    }

    async function toggleLike(commentId) {
        const res = await fetch(`/api/comments/${commentId}/like`, { method: 'POST', credentials: 'same-origin' });
        if (!res.ok) {
            const txt = await safeText(res);
            alert(txt || (res.status === 401 ? 'Please login.' : 'Could not like'));
            return;
        }
        await loadComments();
    }

    document.addEventListener('click', async (e) => {
        const likeBtn = e.target.closest('[data-like]');
        if (likeBtn) {
            await toggleLike(likeBtn.getAttribute('data-like'));
        }
        const replyBtn = e.target.closest('[data-reply]');
        if (replyBtn) {
            const parentId = replyBtn.getAttribute('data-reply');
            const content = prompt('Reply:');
            if (content && content.trim()) {
                await postComment(content.trim(), parentId);
            }
        }
    });

    document.getElementById('postCommentBtn')?.addEventListener('click', async () => {
        const ta = document.getElementById('newComment');
        const content = ta.value.trim();
        if (!content) return;
        await postComment(content, null);
        ta.value = '';
    });

    document.getElementById('rateBtn')?.addEventListener('click', submitRating);

    loadRatingSummary();
    loadComments();
</script>

</body>
</html>
