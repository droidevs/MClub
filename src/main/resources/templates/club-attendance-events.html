<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1"><i class="bi bi-calendar-check me-2"></i>Attendance</h2>
            <div class="text-muted">Choose an event to manage check-in.</div>
        </div>
        <a th:href="@{/clubs/my-managed}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <h5 class="card-title">
                <span th:text="${club.name}"></span>
                <span class="badge bg-primary ms-2"
                      th:text="${eventsPage.totalElements}"></span>
            </h5>
            <p class="text-muted mb-4" th:text="${club.description}">Club description</p>

            <div class="list-group">
                <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                   th:each="event : ${eventsPage.content}"
                   th:href="@{/events/{eventId}/attendance(eventId=${event.id})}">
                    <div>
                        <div class="fw-semibold" th:text="${event.title}"></div>

                        <div class="text-muted small">
                            <i class="bi bi-calendar-event me-1"></i>
                            <span th:text="${#temporals.format(event.startDate, 'dd MMM yyyy HH:mm')}"></span>

                            <span class="mx-1">→</span>

                            <span th:text="${#temporals.format(event.endDate, 'dd MMM yyyy HH:mm')}"></span>
                        </div>
                    </div>
                    <span class="badge bg-primary rounded-pill">
                        <i class="bi bi-arrow-right"></i> Manage
                    </span>
                </a>

                <div class="text-center text-muted py-5"
                     th:if="${eventsPage.totalElements == 0}">

                    <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>

                    No events available for attendance.

                    <div class="mt-2">
                        <a th:href="@{/clubs/{clubId}(clubId=${club.id})}"
                           class="btn btn-outline-primary btn-sm">
                            Go to Club
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3"
         th:if="${eventsPage.totalPages > 1}">

        <!-- Info -->
        <div class="text-muted small">
            Page <b th:text="${eventsPage.number + 1}"></b>
            of <b th:text="${eventsPage.totalPages}"></b>
        </div>

        <!-- Pagination -->
        <ul class="pagination pagination-sm mb-0">

            <!-- PREV -->
            <li class="page-item"
                th:classappend="${eventsPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/clubs/{clubId}/attendance(
                   clubId=${club.id},
                   page=${eventsPage.number - 1},
                   size=${eventsPage.size}
               )}">
                    ←
                </a>
            </li>

            <!-- WINDOW -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(
                T(java.lang.Math).max(0, eventsPage.number - 2),
                T(java.lang.Math).min(eventsPage.totalPages - 1, eventsPage.number + 2)
            )}"
                th:classappend="${i == eventsPage.number} ? 'active'">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/clubs/{clubId}/attendance(
                   clubId=${club.id},
                   page=${i},
                   size=${eventsPage.size}
               )}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${eventsPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/clubs/{clubId}/attendance(
                   clubId=${club.id},
                   page=${eventsPage.number + 1},
                   size=${eventsPage.size}
               )}">
                    →
                </a>
            </li>

        </ul>
    </div>
</div>

</body>
</html>
