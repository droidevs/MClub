<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <div>
            <h2 class="display-6">Create activity</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/clubs}">Back</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Submit via REST API (JSON) -->
    <form id="createActivityForm" th:object="${form}" class="card shadow-sm border-0">
        <div class="card-body">
            <input type="hidden" th:field="*{clubId}" />

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" th:field="*{title}" />
                <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Link to event (optional)</label>

                <div id="selectedEvent" class="mt-2 text-success small"></div>

                <input type="text"
                       id="eventSearch"
                       class="form-control"
                       placeholder="Search event by title...">

                <input type="hidden" name="eventId" id="eventId">

                <div id="eventResults" class="list-group mt-2"></div>

                <div class="d-flex justify-content-between mt-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="prevPage">Prev</button>
                    <button type="button" class="btn btn-sm btn-outline-primary" id="nextPage">Next</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Link to event (optional)</label>
                <select class="form-select" th:field="*{eventId}">
                    <option value="">No event</option>
                    <option th:each="e : ${events}" th:value="${e.id}" th:text="${e.title}">Event</option>
                </select>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <button class="btn btn-primary" type="submit">Create</button>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById('createActivityForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formEl = /** @type {HTMLFormElement} */ (e.target);
        const fd = new FormData(formEl);

        const dto = {
            clubId: fd.get('clubId'),
            eventId: fd.get('eventId') || null,
            title: fd.get('title'),
            description: fd.get('description'),
            date: fd.get('date')
        };

        const res = await fetch('/api/activities', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dto)
        });

        if (res.ok) {
            window.location.href = '/club-admin/clubs';
            return;
        }

        const text = await res.text();
        alert(text || 'Could not create activity');
    });

    let page = 0;
    let query = '';
    const clubId = document.querySelector('input[name="clubId"]').value;

    async function loadEvents() {
        const res = await fetch(`/api/events/light-search?clubId=${clubId}&q=${query}&page=${page}`);
        const data = await res.json();

        const container = document.getElementById('eventResults');
        container.innerHTML = '';

        if (data.content.length === 0) {
            container.innerHTML = '<div class="text-muted p-2">No events found</div>';
            return;
        }

        data.content.forEach(e => {
            const item = document.createElement('button');
            item.className = 'list-group-item list-group-item-action';
            item.textContent = e.title;

            item.onclick = () => {
                document.getElementById('eventId').value = e.id;
                document.getElementById('eventSearch').value = e.title;
                document.getElementById('selectedEvent').textContent = "Selected: " + e.title;
                container.innerHTML = '';
            };

            container.appendChild(item);
        });
    }

    let debounce;
    document.getElementById('eventSearch').addEventListener('input', (e) => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
            query = e.target.value;
            page = 0;
            loadEvents();
        }, 300);
    });

    // pagination
    document.getElementById('nextPage').onclick = () => {
        page++;
        loadEvents();
    };

    document.getElementById('prevPage').onclick = () => {
        if (page > 0) page--;
        loadEvents();
    };

</script>

</body>
</html>
